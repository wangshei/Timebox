name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM (M1+) — Intel Macs run via Rosetta 2
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          # Linux
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
          # Windows
          - platform: windows-latest
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: https://ncytumkcrqudybidndmy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jeXR1bWtjcnF1ZHliaWRuZG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3NjExNjcsImV4cCI6MjA4NjMzNzE2N30.BgojzeRd7_bOaDqv5pPy1GmR3GiwudzzXRxRBvTs78g
        with:
          tagName: v__VERSION__
          releaseName: 'The Timeboxing Club v__VERSION__'
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | **macOS** (Apple Silicon & Intel) | `.dmg` file |
            | **Windows** | `.msi` installer |
            | **Linux** | `.deb` or `.AppImage` |

            ### macOS first launch
            Since the app is not yet notarized with Apple, macOS may show a warning. To open it:
            1. Right-click the app → **Open** → click **Open** in the dialog
            2. Or run in Terminal: `xattr -cr /Applications/The\ Timeboxing\ Club.app`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
